name: Secret scan (gitleaks)

# T7-accept-kriterium från säkerhetsremedieringen 2026-05-25 (PR #15):
# "gitleaks detect rent i repot". Körs på alla PR'ar mot main + alla pushar till
# main + en gång i veckan som drift-skydd.
#
# Sekret-läckor stoppar PR'n (exit code != 0). Falska positiva tystas i
# .gitleaks.toml (allowlist per fil/regel).
#
# Vi använder gitleaks CLI direkt (inte gitleaks/gitleaks-action) för att
# slippa hantera GITLEAKS_LICENSE-kravet för organizational repos.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Varje måndag kl 06:00 UTC — fångar reglerings-uppdateringar och
    # eventuell drift sedan senaste merge.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: gitleaks detect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full historik för historik-scan)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # gitleaks detect behöver full historik

      - name: Installera gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VER=8.18.4
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan all history (gitleaks detect)
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --no-banner \
            --exit-code 1
