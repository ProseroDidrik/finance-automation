# Lokal Postgres för dev/test av Azure-migrationen.
#
# Starta:   docker compose up -d postgres
# Stoppa:   docker compose stop postgres
# Radera:   docker compose down -v   (tar även volymen → tomt warehouse igen)
#
# Connection-string (sätt i $env:DATABASE_URL):
#   postgresql://dev:dev@localhost:5432/finance

services:
  postgres:
    image: postgres:16
    container_name: finance-pg-dev
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: finance
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d finance"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
